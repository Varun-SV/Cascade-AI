# Publishes a GitHub Release whenever package.json's version on main has no
# release yet. Idempotent: every push to main checks the current version and
# creates a release only if one doesn't already exist, so merging a version bump
# (or this workflow itself) publishes the release automatically.
# After creating the release, builds native desktop installers (macOS/Windows/Linux)
# and attaches them to the release alongside the auto-generated source archives.
name: Release on version change

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      created: ${{ steps.check.outputs.exists == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Pull the section between "## [VERSION]" and the next "## [" header.
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { flag=0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          # Fall back to a stub if the changelog has no matching section.
          if ! grep -q "[^[:space:]]" RELEASE_NOTES.md 2>/dev/null; then
            printf 'Release v%s\n' "$VERSION" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: npm publish

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    needs: release
    # Runs after a new release is created, or on a manual dispatch so the
    # installers can be (re)built and attached to the current release without
    # bumping the version.
    if: needs.release.outputs.created == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_flag: "--mac"
          - os: windows-2022
            platform_flag: "--win"
          - os: ubuntu-latest
            platform_flag: "--linux"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Python 3.11 still ships distutils, which node-gyp needs to compile the
      # core's native better-sqlite3 dependency (Python 3.12 removed it).
      - name: Setup Python (node-gyp toolchain)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build Cascade core (electron-builder extraResources)
        run: npm run build:cli

      - name: Build desktop renderer + main
        run: npm run build -w app

      - name: Rebuild native modules for Electron
        working-directory: app
        run: npx @electron/rebuild -f -w node-pty

      - name: Package & publish installer
        working-directory: app
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: npx electron-builder ${{ matrix.platform_flag }} --publish always
