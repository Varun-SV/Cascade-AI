appId: com.varunsv.cascade-ai
productName: Cascade AI
copyright: Copyright © 2026 Varun SV

directories:
  output: dist-app
  buildResources: assets

# node-pty is rebuilt for the Electron ABI by the explicit `@electron/rebuild`
# step in CI (which uses @electron/node-gyp with current VS 2022 detection).
# Disable electron-builder's own npmRebuild so it doesn't recompile node-pty
# with app-builder-lib's pinned, older node-gyp (which fails to find VS 2022).
npmRebuild: false

files:
  - dist-renderer/**
  - dist-electron/**
  - assets/**
  # Ship every PRODUCTION dependency the main process requires at runtime
  # (electron-updater, node-pty, …). Previously this excluded ALL of node_modules
  # and re-included only node-pty, leaving electron-updater out of the package —
  # so require('electron-updater') threw and "Check for Updates" reported the
  # updater as unavailable. Exclude only the workspace package (shipped
  # separately as cascade-core via extraResources).
  - "!node_modules/cascade-ai/**"

asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"

extraResources:
  - from: "../dist"
    to: "cascade-core"
    filter: ["**/*.js", "**/*.cjs", "**/*.mjs", "**/*.node"]
  # The embedded backend (DashboardServer) needs better-sqlite3 at runtime, but
  # tsup keeps it external (native modules can't be bundled). Ship it — plus its
  # runtime deps `bindings` / `file-uri-to-path` — into the core's node_modules
  # so `require('better-sqlite3')` resolves from cascade-core/index.cjs. The
  # binary is rebuilt for the Electron ABI by the @electron/rebuild CI step.
  - from: "../node_modules/better-sqlite3"
    to: "cascade-core/node_modules/better-sqlite3"
    filter: ["**/*", "!**/*.o", "!**/*.obj", "!deps/**", "!src/**"]
  - from: "../node_modules/bindings"
    to: "cascade-core/node_modules/bindings"
  - from: "../node_modules/file-uri-to-path"
    to: "cascade-core/node_modules/file-uri-to-path"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.png
  target:
    # dmg is the user-facing installer; zip is required by electron-updater to
    # deliver macOS auto-updates (it can't update from a .dmg).
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  icon: assets/icon.png
  target:
    - target: nsis      # standard installer (+ auto-update)
      arch: [x64]
    - target: portable  # single self-contained .exe, no install
      arch: [x64]

linux:
  icon: assets/icon.png
  category: Development
  # Metadata required by the deb/rpm/pacman packagers.
  maintainer: Varun SV <varunsv29102001@gmail.com>
  vendor: Varun SV
  synopsis: Multi-tier AI orchestration desktop app
  description: >-
    Cascade AI — a purpose-built desktop application for multi-tier (T1/T2/T3)
    AI agent orchestration.
  target:
    - target: AppImage  # portable, distro-agnostic (+ auto-update)
      arch: [x64]
    - target: deb       # Debian / Ubuntu
      arch: [x64]
    - target: rpm       # Fedora / RHEL / openSUSE
      arch: [x64]
    - target: pacman    # Arch Linux (.pkg.tar.zst)
      arch: [x64]

publish:
  provider: github
  owner: varun-sv
  repo: cascade-ai
  # The release job publishes a non-draft GitHub Release before this build runs.
  # electron-builder defaults to releaseType: draft, which it considers
  # incompatible with an existing published release and skips every upload
  # ("existing type not compatible with publishing type"). Match the published
  # release so the installers + latest*.yml actually attach.
  releaseType: release
