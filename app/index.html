<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade AI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ───────────────────────────────────────────────────────────────
         Cascade AI — design tokens (JetBrains Fleet / Xcode inspired)
         Shared variable NAMES across light + dark so the (mostly inline)
         component styles adapt with zero per-component changes — only the
         token VALUES differ between themes.

         Theme is selected by a `data-theme="light|dark"` attribute on <html>
         (set by useTheme from the user's System/Light/Dark preference).
         `:root` holds the LIGHT palette; `:root[data-theme="dark"]` overrides.

         Spacing scale (4px base):  4 · 8 · 12 · 16 · 24 · 32
         Type scale (px):           10 · 11 · 12 · 13 · 15 · 18 · 24
         ─────────────────────────────────────────────────────────────── */
      :root {
        color-scheme: light;

        /* Neutral ramp — soft, paper-like */
        --bg-base:        #f4f5f7;
        --bg-surface:     #ffffff;
        --bg-raised:      #eef0f3;
        --bg-overlay:     #ffffff;
        --bg-hover:       #e8eaee;
        --bg-active:      #dfe2e7;

        --border:         #e3e5ea;
        --border-strong:  #cfd3da;

        --text:           #1b1d21;
        --text-muted:     #5b616b;
        --text-dim:       #9aa0aa;

        /* Primary accent — Fleet/Xcode blue, single restrained hue */
        --accent:         #2f6fed;
        --accent-hover:   #295fd0;
        --accent-dim:     #d6e2fb;
        --accent-soft:    rgba(47, 111, 237, 0.12);
        --accent-2:       #6a5cff;          /* soft indigo — calm gradient pair */
        --accent-2-soft:  rgba(106, 92, 255, 0.12);

        /* Per-tier identity (kept distinct but desaturated) */
        --t1:             #c0801c;
        --t1-soft:        rgba(192, 128, 28, 0.13);
        --t2:             #7a4fd0;
        --t2-soft:        rgba(122, 79, 208, 0.13);
        --t3:             #1f8fa0;
        --t3-soft:        rgba(31, 143, 160, 0.13);

        /* Semantic */
        --success:        #1f9d57;
        --success-soft:   rgba(31, 157, 87, 0.13);
        --warn:           #c6881f;
        --warn-soft:      rgba(198, 136, 31, 0.13);
        --danger:         #d23b34;
        --danger-soft:    rgba(210, 59, 52, 0.13);
        --info:           #2f6fed;

        /* Back-compat aliases (existing components read these) */
        --green:          var(--success);
        --yellow:         var(--warn);
        --red:            var(--danger);

        /* Radii scale — slightly rounded, Fleet-like */
        --radius-sm:      6px;
        --radius-md:      9px;
        --radius-lg:      13px;
        --radius-xl:      18px;
        --radius:         var(--radius-md); /* back-compat */

        /* Elevation — soft, low-contrast */
        --shadow-1:       0 1px 2px rgba(20,24,33,0.08), 0 1px 3px rgba(20,24,33,0.05);
        --shadow-2:       0 6px 22px rgba(20,24,33,0.10);
        --shadow-3:       0 20px 56px rgba(20,24,33,0.16);
        --glow-accent:    0 0 0 1px var(--accent-soft), 0 4px 18px rgba(47,111,237,0.14);

        /* Typography */
        --font-ui:        -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
        --font-mono:      'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;

        /* Motion */
        --ease:           cubic-bezier(0.4, 0, 0.2, 1);
        --dur:            0.15s;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;

        /* Neutral ramp — warm-neutral charcoal (not pure black) */
        --bg-base:        #1b1c1e;
        --bg-surface:     #202123;
        --bg-raised:      #26282b;
        --bg-overlay:     #2b2d30;
        --bg-hover:       #2f3236;
        --bg-active:      #383b40;

        --border:         #2c2e32;
        --border-strong:  #3b3e44;

        --text:           #e7e8ea;
        --text-muted:     #9ba0a8;
        --text-dim:       #686d75;

        --accent:         #4f8cff;
        --accent-hover:   #6a9dff;
        --accent-dim:     #20304f;
        --accent-soft:    rgba(79, 140, 255, 0.16);
        --accent-2:       #8a7bff;
        --accent-2-soft:  rgba(138, 123, 255, 0.16);

        --t1:             #e0a458;
        --t1-soft:        rgba(224, 164, 88, 0.15);
        --t2:             #b08cff;
        --t2-soft:        rgba(176, 140, 255, 0.15);
        --t3:             #56b6c2;
        --t3-soft:        rgba(86, 182, 194, 0.15);

        --success:        #4caf72;
        --success-soft:   rgba(76, 175, 114, 0.16);
        --warn:           #d9a441;
        --warn-soft:      rgba(217, 164, 65, 0.16);
        --danger:         #e5534b;
        --danger-soft:    rgba(229, 83, 75, 0.16);
        --info:           #4f8cff;

        --shadow-1:       0 1px 2px rgba(0,0,0,0.40), 0 1px 3px rgba(0,0,0,0.28);
        --shadow-2:       0 8px 28px rgba(0,0,0,0.46);
        --shadow-3:       0 24px 64px rgba(0,0,0,0.60);
        --glow-accent:    0 0 0 1px var(--accent-soft), 0 4px 20px rgba(79,140,255,0.22);
      }

      :root[data-theme="midnight"] {
        color-scheme: dark;

        /* Midnight — deep navy + violet (Cascade design palette) */
        --bg-base:        #06080f;
        --bg-surface:     #0f1117;
        --bg-raised:      #131520;
        --bg-overlay:     #1a1d2e;
        --bg-hover:       #1e2133;
        --bg-active:      #2a2d3e;

        --border:         #1a1d2e;
        --border-strong:  #2a2d3e;

        --text:           #cdd6f4;
        --text-muted:     #a6adc8;
        --text-dim:       #6e738d;

        --accent:         #7c6af7;
        --accent-hover:   #8f80ff;
        --accent-dim:     #241b54;
        --accent-soft:    rgba(124, 106, 247, 0.16);
        --accent-2:       #b87fff;
        --accent-2-soft:  rgba(184, 127, 255, 0.16);

        --t1:             #7c6af7;
        --t1-soft:        rgba(124, 106, 247, 0.15);
        --t2:             #00d4e8;
        --t2-soft:        rgba(0, 212, 232, 0.15);
        --t3:             #22d47a;
        --t3-soft:        rgba(34, 212, 122, 0.15);

        --success:        #22d47a;
        --success-soft:   rgba(34, 212, 122, 0.16);
        --warn:           #f5a623;
        --warn-soft:      rgba(245, 166, 35, 0.16);
        --danger:         #ff4d6a;
        --danger-soft:    rgba(255, 77, 106, 0.16);
        --info:           #7c6af7;

        --shadow-1:       0 1px 2px rgba(0,0,0,0.50), 0 1px 3px rgba(0,0,0,0.38);
        --shadow-2:       0 8px 28px rgba(0,0,0,0.55);
        --shadow-3:       0 24px 64px rgba(0,0,0,0.70);
        --glow-accent:    0 0 0 1px var(--accent-soft), 0 4px 20px rgba(124,106,247,0.28);
      }

      html, body, #root { height: 100%; overflow: hidden; }
      body {
        background:
          radial-gradient(1100px 560px at 82% -12%, var(--accent-soft), transparent 60%),
          var(--bg-base);
        color: var(--text);
        font-family: var(--font-ui);
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease);
      }

      /* Selection + focus polish */
      ::selection { background: var(--accent-soft); color: var(--text); }
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
        border-radius: 4px;
      }
      button { font-family: inherit; }
      button:focus:not(:focus-visible) { outline: none; }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 5px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); background-clip: padding-box; }

      /* Shared keyframes */
      @keyframes pulse   { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
      @keyframes fadeIn  { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }
      @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
      @keyframes blink   { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
