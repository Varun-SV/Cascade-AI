<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade AI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ───────────────────────────────────────────────────────────────
         Cascade AI — design tokens (dark-mode-first, evolved palette)
         Spacing scale (4px base):  4 · 8 · 12 · 16 · 24 · 32
         Type scale (px):           10 · 11 · 12 · 13 · 15 · 18 · 24
         ─────────────────────────────────────────────────────────────── */
      :root {
        /* Neutral ramp — cooler, deeper, layered */
        --bg-base:        #0a0a0d;
        --bg-surface:     #111116;
        --bg-raised:      #18181f;
        --bg-overlay:     #1f1f28;
        --bg-hover:       #26262f;
        --bg-active:      #2e2e3a;

        --border:         #26262f;
        --border-strong:  #383844;

        --text:           #ececf2;
        --text-muted:     #8888a0;
        --text-dim:       #5a5a6e;

        /* Primary accent (violet) + secondary (cyan) */
        --accent:         #8b7cf9;
        --accent-hover:   #9d90fa;
        --accent-dim:     #2a2358;
        --accent-soft:    rgba(139, 124, 249, 0.14);
        --accent-2:       #3ec9d6;
        --accent-2-soft:  rgba(62, 201, 214, 0.14);

        /* Per-tier identity (matches marketing site: T1 amber · T2 violet · T3 cyan) */
        --t1:             #f5a623;
        --t1-soft:        rgba(245, 166, 35, 0.14);
        --t2:             #8b7cf9;
        --t2-soft:        rgba(139, 124, 249, 0.14);
        --t3:             #3ec9d6;
        --t3-soft:        rgba(62, 201, 214, 0.14);

        /* Semantic */
        --success:        #3ecf8e;
        --success-soft:   rgba(62, 207, 142, 0.14);
        --warn:           #f5a623;
        --warn-soft:      rgba(245, 166, 35, 0.14);
        --danger:         #f0506e;
        --danger-soft:    rgba(240, 80, 110, 0.14);
        --info:           #3ec9d6;

        /* Back-compat aliases (existing components read these) */
        --green:          var(--success);
        --yellow:         var(--warn);
        --red:            var(--danger);

        /* Radii scale */
        --radius-sm:      5px;
        --radius-md:      8px;
        --radius-lg:      12px;
        --radius-xl:      16px;
        --radius:         var(--radius-md); /* back-compat */

        /* Elevation */
        --shadow-1:       0 1px 2px rgba(0,0,0,0.30), 0 1px 3px rgba(0,0,0,0.18);
        --shadow-2:       0 8px 28px rgba(0,0,0,0.38);
        --shadow-3:       0 24px 64px rgba(0,0,0,0.52);
        --glow-accent:    0 0 0 1px var(--accent-soft), 0 4px 20px rgba(139,124,249,0.22);

        /* Typography */
        --font-ui:        -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
        --font-mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;

        /* Motion */
        --ease:           cubic-bezier(0.4, 0, 0.2, 1);
        --dur:            0.15s;
      }

      html, body, #root { height: 100%; overflow: hidden; }
      body {
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(139,124,249,0.06), transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(62,201,214,0.05), transparent 55%),
          var(--bg-base);
        color: var(--text);
        font-family: var(--font-ui);
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Selection + focus polish */
      ::selection { background: var(--accent-soft); color: var(--text); }
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
        border-radius: 4px;
      }
      button { font-family: inherit; }
      button:focus:not(:focus-visible) { outline: none; }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 5px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: #46465a; background-clip: padding-box; }

      /* Shared keyframes */
      @keyframes pulse   { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
      @keyframes fadeIn  { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }
      @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
      @keyframes blink   { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
