<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect x='5' y='9' width='27' height='8' rx='4' fill='%234C8DFF'/%3E%3Crect x='11' y='20' width='27' height='8' rx='4' fill='%2338B0DE'/%3E%3Crect x='17' y='31' width='26' height='8' rx='4' fill='%232DD4BF'/%3E%3C/svg%3E" />
    <title>Cascade Cloud</title>
    <script>
      // Apply theme + density BEFORE first paint so there's no flash of the
      // wrong palette. Mirrors lib/theme.ts (kept intentionally tiny & inline).
      (function () {
        try {
          var mode = localStorage.getItem('cascade-cloud-theme') || 'system';
          var dark = mode === 'dark' || (mode === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
          var density = localStorage.getItem('cascade-cloud-density') || 'comfortable';
          document.documentElement.dataset.density = density;
        } catch (e) { document.documentElement.dataset.theme = 'dark'; }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
